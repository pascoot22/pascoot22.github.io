  <div id="encode" class="main-content">
    <p>What do you want to encode</p>
    <input type="text" id="message"></input>
    <button onclick="hashString()">Encode</button>
  </div>
  

  <p id="success"></p>
  
<script>

  async function hashString() {
    const str = document.getElementById('message').value;
    const buffer = new TextEncoder().encode(str);
    const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
    const ans = Array.from(new Uint8Array(hashBuffer))
      .map(b => b.toString(16).padStart(2, '0'))
      .join('');
    document.getElementById('success').textContent = ans;
  }



</script>
