  <div id="password" class="main-content">
    <p>Guess the password</p>
    <input type="password" id="guess"></input>
    <button onclick="checkpw()">Guess</button>
  </div>
  

  <p id="success" style="display:none">Success!</p>
  
<script>

const CORRECT_HASH = "5e884898da28047151d0e56f8dc6292773603d0d6aabbdd62a11ef721d1542d8";

  async function hashString(str) {
    const buffer = new TextEncoder().encode(str);
    const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
    return Array.from(new Uint8Array(hashBuffer))
      .map(b => b.toString(16).padStart(2, '0'))
      .join('');
  }

  async function checkpw() {
    const input = document.getElementById('guess').value;
    const hash = await hashString(input);
    
    if (hash === CORRECT_HASH) {
      document.getElementById('success').style.display = 'block';
      document.getElementById('password').style.display = 'none';
    } else {
      alert('Incorrect password');
    }
  }


</script>
